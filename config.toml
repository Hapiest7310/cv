[layout]
# Main vertical layout (NAME, MIDDLE, PROJECTS)
name_height = 7
middle_height = 22  # 0 = auto fill, >0 = fixed height
projects_height = 0  # 0 = auto fill, >0 = fixed height

# Middle horizontal layout (LEFT, RIGHT)
image_width = 25  # 0 = auto fill, >0 = fixed width
right_width = 0  # 0 = auto fill, >0 = fixed width

# Left vertical layout (IMAGE, SKILLS)
image_height = 12
skills_height = 0  # 0 = auto fill, >0 = fixed height

# Right vertical layout (ABOUT, EDUCATION, CONTACTS)
about_height = 0  # 0 = auto fill, >0 = fixed height
education_height = 4  # 0 = auto fill, >0 = fixed height
contacts_height = 6

# Gaps
skills_gap = 0
contacts_gap = 0

[projects]
# Individual project heights - set to 0 to disable a project
